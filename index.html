<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Survey Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #140c22;
    --surface: #1c1230;
    --surface-alt: #23183a;
    --purple: #6b3d96;
    --purple-mid: #7d4aad;
    --border: #3a2a55;
    --text: #f2eef8;
    --text-muted: #b0a3c4;
    --editable: #3d2a58;
    --error: #d94a6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    height: 36px;
    width: auto;
    display: block;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .top-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: stretch;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    width: fit-content;
    max-width: 100%;
  }
  .card h2 {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 600;
    color: #d4c4e8;
  }
  .card-markets {
    width: 100%;
  }
  .card-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  label { font-size: 13px; color: var(--text); }
  .field {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .field:first-of-type { margin-top: 0; }
  input[type=number] {
    padding: 4px 7px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    outline: none;
    width: 68px;
  }
  input[type=number]:focus { border-color: var(--purple-mid); }
  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .radio-group.inline {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 14px;
  }
  .radio-group label {
    cursor: pointer;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .radio-group label:has(input:checked) { color: var(--text); }
  .radio-group input[type=radio] {
    accent-color: var(--purple-mid);
    margin-right: 4px;
  }
  .editable-note {
    background: var(--editable);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    color: #e0d4ef;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  #marketCount {
    font-size: 12px;
    color: var(--text-muted);
  }
  #marketGrid {
    display: grid;
    grid-template-columns: repeat(4, max-content);
    gap: 3px 18px;
  }
  #marketGrid label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-muted);
  }
  #marketGrid label:hover { color: var(--text); }
  #marketGrid input[type=checkbox] { accent-color: var(--purple-mid); }
  button.small {
    padding: 4px 10px;
    font-size: 12px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  button.small:hover {
    background: #2c2044;
    border-color: #4a3a65;
  }
  #generateBtn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  #generateBtn:hover { background: var(--purple-mid); }
  #generateBtn:disabled {
    background: #4a3560;
    cursor: wait;
  }
  #status { font-size: 13px; color: var(--text-muted); }
  #error { color: var(--error); font-size: 13px; }
  @media (max-width: 720px) {
    #marketGrid { grid-template-columns: repeat(2, max-content); }
  }
</style>
</head>
<body>
<header>
  <img class="logo" src="logo.jpg" alt="Omnicom Media Group">
  <h1>Market Survey Generator</h1>
</header>
<main>
  <div class="top-row">
    <div class="card">
      <h2>Survey type</h2>
      <div class="radio-group">
        <label><input type="radio" name="stype" value="main" checked> Main survey</label>
        <label><input type="radio" name="stype" value="supplemental"> Historical restatement</label>
      </div>
    </div>

    <div class="card">
      <h2>Years</h2>
      <div class="field">
        <label>Columns</label>
        <input type="number" id="yearFrom" value="1999" min="1980" max="2100"> &ndash;
        <input type="number" id="yearTo" value="2026" min="1980" max="2100">
      </div>
      <div class="field">
        <label><span class="editable-note">Editable</span></label>
        <input type="number" id="editFrom" value="2025" min="1980" max="2100"> &ndash;
        <input type="number" id="editTo" value="2026" min="1980" max="2100">
      </div>
    </div>

    <div class="card">
      <h2>Historical data</h2>
      <div class="radio-group">
        <label><input type="radio" name="populate" value="historical" checked> Pre-fill locked years</label>
        <label><input type="radio" name="populate" value="blank"> Blank templates</label>
      </div>
    </div>
  </div>

  <div class="card card-markets">
    <h2>Markets</h2>
    <div class="toolbar">
      <button class="small" id="selectAll">Select all</button>
      <button class="small" id="selectNone">Clear</button>
      <span id="marketCount"></span>
    </div>
    <div id="marketGrid"></div>
  </div>

  <div class="card card-actions">
    <button id="generateBtn">Generate surveys</button>
    <span id="status"></span>
    <div id="error"></div>
  </div>
</main>

<script src="vendor/exceljs.min.js"></script>
<script src="vendor/jszip.min.js"></script>
<script src="survey-core.js"></script>
<script src="app.js"></script>
</body>
</html>
