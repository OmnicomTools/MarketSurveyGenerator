<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Survey Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #140c22;
    --surface: #1c1230;
    --surface-alt: #23183a;
    --purple: #6b3d96;
    --purple-mid: #7d4aad;
    --border: #3a2a55;
    --text: #f2eef8;
    --text-muted: #b0a3c4;
    --editable: #3d2a58;
    --error: #d94a6a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    height: 36px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  main {
    flex: 1;
    min-height: 0;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 16px 12px;
    display: grid;
    grid-template-columns: 1fr 1.35fr;
    grid-template-rows: auto auto 1fr auto;
    gap: 10px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    min-height: 0;
  }
  .card h2 {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 600;
    color: #d4c4e8;
  }
  .card-type { grid-column: 1; grid-row: 1; }
  .card-years { grid-column: 1; grid-row: 2; }
  .card-hist { grid-column: 1; grid-row: 3; align-self: start; }
  .card-markets {
    grid-column: 2;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
  }
  .card-actions {
    grid-column: 1 / -1;
    grid-row: 4;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
  }
  label { font-size: 13px; color: var(--text); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .field { display: flex; align-items: center; gap: 6px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  input[type=number] {
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    outline: none;
    width: 72px;
  }
  input[type=number]:focus { border-color: var(--purple-mid); }
  .radio-group { display: flex; flex-direction: column; gap: 6px; }
  .radio-group label { cursor: pointer; color: var(--text-muted); }
  .radio-group label:has(input:checked) { color: var(--text); }
  .radio-group input[type=radio] {
    accent-color: var(--purple-mid);
    margin-right: 4px;
  }
  .editable-note {
    background: var(--editable);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    color: #e0d4ef;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  #marketGrid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 2px 8px;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    background: var(--surface-alt);
    overflow: hidden;
    align-content: start;
  }
  #marketGrid label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-muted);
    padding: 2px 3px;
    border-radius: 3px;
  }
  #marketGrid label:hover { color: var(--text); background: rgba(255, 255, 255, 0.04); }
  #marketGrid input[type=checkbox] { accent-color: var(--purple-mid); }
  button.small {
    padding: 4px 10px;
    font-size: 12px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  button.small:hover {
    background: #2c2044;
    border-color: #4a3a65;
  }
  #generateBtn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  #generateBtn:hover { background: var(--purple-mid); }
  #generateBtn:disabled {
    background: #4a3560;
    cursor: wait;
  }
  #status { font-size: 13px; color: var(--text-muted); }
  #error { color: var(--error); font-size: 13px; }
  @media (max-width: 820px) {
    body { overflow: auto; }
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      overflow: auto;
    }
    .card-type, .card-years, .card-hist, .card-markets, .card-actions {
      grid-column: 1;
      grid-row: auto;
    }
    #marketGrid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      overflow: auto;
      max-height: 280px;
    }
  }
</style>
</head>
<body>
<header>
  <img class="logo" src="logo.jpg" alt="Omnicom Media Group">
  <h1>Market Survey Generator</h1>
</header>
<main>
  <div class="card card-type">
    <h2>Survey type</h2>
    <div class="radio-group">
      <label><input type="radio" name="stype" value="main" checked> Main survey</label>
      <label><input type="radio" name="stype" value="supplemental"> Historical restatement</label>
    </div>
  </div>

  <div class="card card-years">
    <h2>Years</h2>
    <div class="stack">
      <div class="field">
        <label>Columns</label>
        <input type="number" id="yearFrom" value="1999" min="1980" max="2100"> &ndash;
        <input type="number" id="yearTo" value="2026" min="1980" max="2100">
      </div>
      <div class="field">
        <label><span class="editable-note">Editable</span></label>
        <input type="number" id="editFrom" value="2025" min="1980" max="2100"> &ndash;
        <input type="number" id="editTo" value="2026" min="1980" max="2100">
      </div>
    </div>
  </div>

  <div class="card card-hist">
    <h2>Historical data</h2>
    <div class="radio-group">
      <label><input type="radio" name="populate" value="historical" checked> Pre-fill locked years</label>
      <label><input type="radio" name="populate" value="blank"> Blank templates</label>
    </div>
  </div>

  <div class="card card-markets">
    <h2>Markets</h2>
    <div class="toolbar">
      <button class="small" id="selectAll">Select all</button>
      <button class="small" id="selectNone">Clear</button>
      <span id="marketCount" style="font-size:12px;color:var(--text-muted)"></span>
    </div>
    <div id="marketGrid"></div>
  </div>

  <div class="card card-actions">
    <button id="generateBtn">Generate surveys</button>
    <span id="status"></span>
    <div id="error"></div>
  </div>
</main>

<script src="vendor/exceljs.min.js"></script>
<script src="vendor/jszip.min.js"></script>
<script src="survey-core.js"></script>
<script src="app.js"></script>
</body>
</html>
