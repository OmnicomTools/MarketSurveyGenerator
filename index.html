<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Survey Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #120a1f;
    --surface: #1a122c;
    --surface-alt: #241833;
    --purple: #6b3d96;
    --purple-mid: #7d4aad;
    --border: #3d2d58;
    --text: #f5f1fa;
    --text-muted: #b7a9c9;
    --editable: #3d2a58;
    --error: #d94a6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Source Sans 3", "Segoe UI", Arial, sans-serif;
    font-size: 16px;
    color: var(--text);
    background: var(--bg);
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    height: 44px;
    width: auto;
    display: block;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
  }
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 40px 40px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1.1fr 1.2fr 1.1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 22px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #cbb8e0;
  }
  .card-markets {
    margin-bottom: 16px;
  }
  .card-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
  }
  label {
    font-size: 15px;
    color: var(--text);
  }
  .field {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .field:first-of-type { margin-top: 0; }
  .field > label {
    min-width: 78px;
    color: var(--text-muted);
    font-size: 14px;
  }
  input[type=number] {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 15px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    outline: none;
    width: 84px;
  }
  input[type=number]:focus {
    border-color: var(--purple-mid);
  }
  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .radio-group label {
    cursor: pointer;
    color: var(--text-muted);
    line-height: 1.35;
  }
  .radio-group label:has(input:checked) {
    color: var(--text);
    font-weight: 500;
  }
  .radio-group input[type=radio] {
    accent-color: var(--purple-mid);
    margin-right: 6px;
    transform: scale(1.05);
  }
  .editable-note {
    background: var(--editable);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    color: #e4d6f2;
    font-size: 14px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  #marketCount {
    margin-left: 4px;
    font-size: 14px;
    color: var(--text-muted);
  }
  #marketGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px 20px;
    padding: 4px 0 2px;
  }
  #marketGrid label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px 2px;
    border-radius: 4px;
  }
  #marketGrid label:hover {
    color: var(--text);
  }
  #marketGrid input[type=checkbox] {
    accent-color: var(--purple-mid);
    width: 15px;
    height: 15px;
  }
  button.small {
    padding: 7px 14px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface-alt);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
  }
  button.small:hover {
    background: #2c2044;
    border-color: #4a3a65;
  }
  #generateBtn {
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  #generateBtn:hover { background: var(--purple-mid); }
  #generateBtn:disabled {
    background: #4a3560;
    cursor: wait;
  }
  #status { font-size: 15px; color: var(--text-muted); }
  #error { color: var(--error); font-size: 15px; }
  @media (max-width: 900px) {
    main { padding: 24px 20px 32px; }
    header { padding: 16px 20px; }
    .controls { grid-template-columns: 1fr; }
    #marketGrid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 640px) {
    #marketGrid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<header>
  <img class="logo" src="logo.jpg" alt="Omnicom Media Group">
  <h1>Market Survey Generator</h1>
</header>
<main>
  <div class="controls">
    <div class="card">
      <h2>Survey type</h2>
      <div class="radio-group">
        <label><input type="radio" name="stype" value="main" checked> Main survey</label>
        <label><input type="radio" name="stype" value="supplemental"> Historical restatement</label>
      </div>
    </div>

    <div class="card">
      <h2>Years</h2>
      <div class="field">
        <label>Columns</label>
        <input type="number" id="yearFrom" value="1999" min="1980" max="2100"> &ndash;
        <input type="number" id="yearTo" value="2026" min="1980" max="2100">
      </div>
      <div class="field">
        <label><span class="editable-note">Editable</span></label>
        <input type="number" id="editFrom" value="2025" min="1980" max="2100"> &ndash;
        <input type="number" id="editTo" value="2026" min="1980" max="2100">
      </div>
    </div>

    <div class="card">
      <h2>Historical data</h2>
      <div class="radio-group">
        <label><input type="radio" name="populate" value="historical" checked> Pre-fill locked years</label>
        <label><input type="radio" name="populate" value="blank"> Blank templates</label>
      </div>
    </div>
  </div>

  <div class="card card-markets">
    <h2>Markets</h2>
    <div class="toolbar">
      <button class="small" id="selectAll">Select all</button>
      <button class="small" id="selectNone">Clear</button>
      <span id="marketCount"></span>
    </div>
    <div id="marketGrid"></div>
  </div>

  <div class="card card-actions">
    <button id="generateBtn">Generate surveys</button>
    <span id="status"></span>
    <div id="error"></div>
  </div>
</main>

<script src="vendor/exceljs.min.js"></script>
<script src="vendor/jszip.min.js"></script>
<script src="survey-core.js"></script>
<script src="app.js"></script>
</body>
</html>
